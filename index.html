<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#131109">
<meta name="description" content="Teleprompter web con guion editable, scroll automático e indicador de ritmo para grabar videopitches.">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="assets/icon-192.png">
<link rel="apple-touch-icon" href="assets/icon-192.png">
<title>Pitch Up — Teleprompter de pitch</title>
<style>
  :root {
    --bg: #131109;
    --bg-elevated: #1c1811;
    --bg-chip: #241f16;
    --bg-field: #18140d;
    --text: #f2ece0;
    --text-dim: #a89d87;
    --text-faint: #6e6553;
    --accent: #d0713a;
    --accent-soft: rgba(208, 113, 58, 0.16);
    --accent-line: rgba(208, 113, 58, 0.55);
    --good: #8faa7d;
    --warn: #d9a441;
    --bad: #c96a5c;
    --rule: #322c22;
    --focus: #e2b48a;
    --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", ui-sans-serif, system-ui, sans-serif;
    --font-script: "Iowan Old Style", "Palatino Linotype", Palatino, ui-serif, Georgia, serif;
    --script-size: 34px;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-ui);
    overflow: hidden;
  }

  body {
    display: flex;
    flex-direction: column;
  }

  .sr-only {
    position: absolute;
    width: 1px;
    height: 1px;
    padding: 0;
    margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border: 0;
  }

  /* ---------- Header ---------- */

  header {
    flex: 0 0 auto;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--rule);
    padding: 14px 20px 12px;
  }

  .header-top {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }

  .title-block {
    display: flex;
    align-items: baseline;
    gap: 10px;
    min-width: 0;
  }

  .title-block h1 {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.02em;
    margin: 0;
    white-space: nowrap;
  }

  .title-block .subtitle {
    font-size: 12.5px;
    color: var(--text-faint);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .clock-block {
    display: flex;
    align-items: center;
    gap: 10px;
    font-variant-numeric: tabular-nums;
  }

  .elapsed {
    font-size: 26px;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .clock-sep {
    color: var(--text-faint);
    font-size: 18px;
  }

  .target {
    font-size: 15px;
    color: var(--text-dim);
  }

  .pace-pill {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 4px 9px;
    border-radius: 100px;
    background: var(--bg-chip);
    color: var(--text-dim);
    border: 1px solid var(--rule);
    cursor: help;
  }
  .pace-pill[data-pace="on"]   { color: var(--good); border-color: color-mix(in srgb, var(--good) 45%, var(--rule)); }
  .pace-pill[data-pace="ahead"]{ color: var(--focus); border-color: color-mix(in srgb, var(--focus) 45%, var(--rule)); }
  .pace-pill[data-pace="behind"]{ color: var(--warn); border-color: color-mix(in srgb, var(--warn) 45%, var(--rule)); }

  /* progress bar */
  .progress-track {
    margin-top: 12px;
    height: 4px;
    border-radius: 100px;
    background: var(--rule);
    overflow: hidden;
    position: relative;
  }
  .progress-fill {
    height: 100%;
    width: 0%;
    background: var(--accent);
    border-radius: 100px;
  }
  @media (prefers-reduced-motion: no-preference) {
    .progress-fill { transition: width 0.15s linear; }
  }

  /* section chips */
  .sections {
    margin-top: 12px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: thin;
  }
  .sections::-webkit-scrollbar { height: 5px; }
  .sections::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 100px; }

  .chip {
    flex: 0 0 auto;
    display: flex;
    flex-direction: column;
    gap: 2px;
    padding: 6px 12px;
    border-radius: 10px;
    background: var(--bg-chip);
    border: 1px solid var(--rule);
    color: var(--text-dim);
    font-size: 11.5px;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
  }
  .chip .chip-time {
    font-variant-numeric: tabular-nums;
    font-size: 10.5px;
    color: var(--text-faint);
    letter-spacing: 0.03em;
  }
  .chip[data-active="true"] {
    background: var(--accent-soft);
    border-color: var(--accent-line);
    color: var(--text);
  }
  .chip[data-active="true"] .chip-time { color: var(--accent); }

  .empty-hint {
    font-size: 12.5px;
    color: var(--text-faint);
    padding: 6px 2px;
  }

  /* ---------- Controls ---------- */

  .controls {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    background: var(--bg-elevated);
    border-bottom: 1px solid var(--rule);
    flex-wrap: wrap;
  }

  button.ctrl {
    font-family: inherit;
    font-size: 13px;
    font-weight: 600;
    color: var(--text);
    background: var(--bg-chip);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    line-height: 1;
  }
  button.ctrl:hover { border-color: var(--text-faint); }
  button.ctrl:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }
  button.ctrl[data-primary="true"] {
    background: var(--accent);
    border-color: var(--accent);
    color: #1a1108;
  }

  .stepper {
    display: inline-flex;
    align-items: center;
    background: var(--bg-chip);
    border: 1px solid var(--rule);
    border-radius: 8px;
    overflow: hidden;
  }
  .stepper button {
    font-family: inherit;
    background: transparent;
    border: none;
    color: var(--text-dim);
    font-size: 15px;
    width: 30px;
    height: 34px;
    cursor: pointer;
  }
  .stepper button:hover { color: var(--text); background: rgba(255,255,255,0.04); }
  .stepper button:focus-visible { outline: 2px solid var(--focus); outline-offset: -2px; }
  .stepper .stepper-label {
    font-size: 11.5px;
    color: var(--text-dim);
    padding: 0 8px;
    min-width: 58px;
    text-align: center;
    font-variant-numeric: tabular-nums;
  }

  .speed-control {
    display: inline-flex;
    align-items: center;
    gap: 9px;
    height: 34px;
    background: var(--bg-chip);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 0 12px;
  }
  .speed-control-label {
    font-size: 11.5px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .speed-control input[type="range"] {
    width: 130px;
    accent-color: var(--accent);
    cursor: pointer;
  }
  .speed-control input[type="range"]:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 3px;
  }
  .speed-control input[type="number"] {
    width: 34px;
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 11.5px;
    font-variant-numeric: tabular-nums;
    text-align: right;
    padding: 0;
    -moz-appearance: textfield;
  }
  .speed-control input[type="number"]:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 2px;
    border-radius: 4px;
  }
  .speed-control .speed-unit {
    font-size: 11.5px;
    color: var(--text-dim);
    margin-left: -6px;
  }

  .spacer { flex: 1 1 auto; }

  .hint {
    font-size: 11px;
    color: var(--text-faint);
    white-space: nowrap;
  }
  .hint kbd {
    font-family: inherit;
    background: var(--bg-chip);
    border: 1px solid var(--rule);
    border-radius: 4px;
    padding: 1px 5px;
    font-size: 10.5px;
  }

  /* ---------- Scroll stage ---------- */

  .stage {
    position: relative;
    flex: 1 1 auto;
    min-height: 0;
    overflow: hidden;
  }

  .stage.mirrored .scroll { transform: scaleX(-1); }

  .read-line {
    position: absolute;
    left: 0;
    right: 0;
    top: 30%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-line) 12%, var(--accent-line) 88%, transparent);
    z-index: 3;
    pointer-events: none;
  }
  .read-line::before {
    content: "▶";
    position: absolute;
    left: 14px;
    top: -9px;
    color: var(--accent);
    font-size: 12px;
  }

  .fade-top, .fade-bottom {
    position: absolute;
    left: 0; right: 0;
    height: 14%;
    z-index: 2;
    pointer-events: none;
  }
  .fade-top {
    top: 0;
    background: linear-gradient(to bottom, var(--bg) 0%, transparent 100%);
  }
  .fade-bottom {
    bottom: 0;
    background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
  }

  .scroll {
    height: 100%;
    overflow-y: auto;
    scrollbar-width: none;
  }
  .scroll::-webkit-scrollbar { display: none; }

  .script {
    max-width: 46em;
    margin: 0 auto;
    padding: 42vh 32px 55vh;
  }

  .script section { margin-bottom: 46px; }

  .eyebrow {
    display: flex;
    align-items: baseline;
    gap: 10px;
    font-family: var(--font-ui);
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }
  .eyebrow .eyebrow-time {
    font-weight: 500;
    color: var(--text-faint);
    letter-spacing: 0.02em;
    text-transform: none;
    font-variant-numeric: tabular-nums;
  }
  .eyebrow .eyebrow-sub {
    color: var(--text-dim);
    font-weight: 500;
    letter-spacing: 0.02em;
    text-transform: none;
  }

  .line {
    font-family: var(--font-script);
    font-size: var(--script-size);
    line-height: 1.5;
    color: var(--text);
    margin: 0 0 18px;
    text-wrap: pretty;
  }

  .cue {
    font-family: var(--font-ui);
    font-size: calc(var(--script-size) * 0.42);
    font-style: italic;
    color: var(--text-dim);
    background: var(--bg-elevated);
    border-left: 3px solid var(--rule);
    padding: 8px 14px;
    border-radius: 0 6px 6px 0;
    margin: 0 0 18px;
  }

  .note {
    font-family: var(--font-ui);
    font-size: calc(var(--script-size) * 0.4);
    color: var(--text-faint);
    margin: 0 0 18px;
  }

  .the-end {
    text-align: center;
    color: var(--text-faint);
    font-family: var(--font-ui);
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding-top: 10px;
    border-top: 1px solid var(--rule);
  }

  /* ---------- Toast ---------- */

  .toast {
    position: fixed;
    left: 50%;
    bottom: 26px;
    transform: translateX(-50%);
    background: var(--bg-elevated);
    border: 1px solid var(--rule);
    color: var(--text);
    font-size: 13px;
    padding: 10px 16px;
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.35);
    z-index: 50;
    max-width: 90vw;
  }
  .toast[hidden] { display: none; }
  @media (prefers-reduced-motion: no-preference) {
    .toast { animation: toast-in 0.18s ease-out; }
    @keyframes toast-in {
      from { opacity: 0; transform: translateX(-50%) translateY(6px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }
  }

  /* ---------- Editor ---------- */

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(8, 7, 4, 0.55);
    z-index: 40;
    display: flex;
    justify-content: flex-end;
  }
  .overlay[hidden] { display: none; }

  .editor-panel {
    width: min(560px, 100%);
    height: 100%;
    background: var(--bg-elevated);
    border-left: 1px solid var(--rule);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  @media (prefers-reduced-motion: no-preference) {
    .editor-panel { animation: panel-in 0.2s ease-out; }
    @keyframes panel-in {
      from { transform: translateX(24px); opacity: 0; }
      to   { transform: translateX(0); opacity: 1; }
    }
  }

  .editor-head {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--rule);
  }
  .editor-head h2 {
    font-size: 16px;
    margin: 0;
  }
  .editor-close {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--text-dim);
    border-radius: 8px;
    width: 32px;
    height: 32px;
    font-size: 16px;
    cursor: pointer;
    line-height: 1;
  }
  .editor-close:hover { color: var(--text); border-color: var(--text-faint); }
  .editor-close:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  .editor-body {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: 18px 20px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 12px;
  }
  .field label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .field input, .field textarea {
    font-family: var(--font-ui);
    font-size: 14px;
    color: var(--text);
    background: var(--bg-field);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 9px 11px;
    resize: vertical;
  }
  .field textarea { font-family: var(--font-script); line-height: 1.4; min-height: 88px; }
  .field input:focus-visible, .field textarea:focus-visible {
    outline: 2px solid var(--focus);
    outline-offset: 1px;
  }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1 1 auto; }
  .field-hint { font-size: 11px; color: var(--text-faint); margin-top: -2px; }

  .editor-total {
    background: var(--bg-chip);
    border: 1px solid var(--rule);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 18px;
  }

  .section-card {
    background: var(--bg-chip);
    border: 1px solid var(--rule);
    border-radius: 12px;
    padding: 14px;
    margin-bottom: 14px;
  }
  .section-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .section-card-title {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-faint);
  }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--rule);
    color: var(--text-dim);
    border-radius: 6px;
    width: 26px;
    height: 26px;
    font-size: 12px;
    cursor: pointer;
    line-height: 1;
    margin-left: 4px;
  }
  .icon-btn:hover { color: var(--text); border-color: var(--text-faint); }
  .icon-btn:focus-visible { outline: 2px solid var(--focus); outline-offset: 1px; }
  .icon-btn[data-danger="true"]:hover { color: var(--bad); border-color: var(--bad); }

  .editor-foot {
    flex: 0 0 auto;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 14px 20px;
    border-top: 1px solid var(--rule);
    background: var(--bg-elevated);
  }

  .add-section-btn {
    width: 100%;
    background: transparent;
    border: 1px dashed var(--rule);
    color: var(--text-dim);
    border-radius: 10px;
    padding: 10px;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
  }
  .add-section-btn:hover { color: var(--text); border-color: var(--text-faint); }
  .add-section-btn:focus-visible { outline: 2px solid var(--focus); outline-offset: 2px; }

  @media (max-width: 640px) {
    .clock-block { display: none; }
    .hint { display: none; }
    :root { --script-size: 26px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="title-block">
      <h1>Pitch Up</h1>
      <span class="subtitle">Guion editable — armá tu pitch y grabalo</span>
    </div>
    <div class="clock-block">
      <span class="elapsed" id="elapsed" aria-hidden="true">0:00</span>
      <span class="clock-sep" aria-hidden="true">/</span>
      <span class="target" id="targetLabel" aria-hidden="true">3:00</span>
      <span class="pace-pill" id="pacePill" data-pace="on" role="status" aria-live="polite" title="Compara en qué sección deberías estar según el tiempo transcurrido contra en qué sección estás según el scroll. Es una guía aproximada, no una medición exacta.">Listo</span>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
  <nav class="sections" id="sections" aria-label="Secciones del guion"></nav>
</header>

<div class="controls">
  <button class="ctrl" id="playBtn" data-primary="true">▶ Iniciar</button>
  <button class="ctrl" id="resetBtn">↺ Reiniciar</button>
  <button class="ctrl" id="editBtn">✎ Editar guion</button>

  <div class="speed-control">
    <span class="speed-control-label" id="speedControlLabel">Vel.</span>
    <input type="range" id="speedSlider" min="30" max="200" step="1" value="100"
           aria-labelledby="speedControlLabel" aria-valuetext="100%">
    <input type="number" id="speedNumber" min="30" max="200" step="1" value="100"
           aria-label="Velocidad exacta en porcentaje">
    <span class="speed-unit" aria-hidden="true">%</span>
  </div>

  <div class="stepper" aria-label="Tamaño de letra">
    <button id="sizeDown" aria-label="Achicar letra">–</button>
    <span class="stepper-label">Letra</span>
    <button id="sizeUp" aria-label="Agrandar letra">+</button>
  </div>

  <button class="ctrl" id="mirrorBtn">⇋ Espejo</button>
  <button class="ctrl" id="fullscreenBtn">⛶ Pantalla completa</button>

  <div class="spacer"></div>
  <span class="hint"><kbd>Espacio</kbd> play/pausa · <kbd>↑↓</kbd> velocidad · <kbd>M</kbd> espejo · <kbd>F</kbd> pantalla completa · <kbd>E</kbd> editar</span>
</div>

<div class="stage" id="stage">
  <div class="fade-top" aria-hidden="true"></div>
  <div class="read-line" aria-hidden="true"></div>
  <div class="fade-bottom" aria-hidden="true"></div>
  <div class="scroll" id="scroll">
    <div class="script" id="script"></div>
  </div>
</div>

<!-- Editor de guion -->
<div class="overlay" id="editorOverlay" hidden>
  <div class="editor-panel" role="dialog" aria-modal="true" aria-labelledby="editorTitle" id="editorPanel">
    <div class="editor-head">
      <h2 id="editorTitle">Editar guion</h2>
      <button class="editor-close" id="editorCloseBtn" aria-label="Cerrar editor">✕</button>
    </div>
    <div class="editor-body" id="editorBody">
      <div class="editor-total">
        <div class="field" style="margin-bottom:0;">
          <label for="totalInput">Duración total del pitch (mm:ss)</label>
          <input type="text" id="totalInput" inputmode="numeric" placeholder="3:00">
          <span class="field-hint">Se usa para el indicador de ritmo y la columna de tiempo objetivo.</span>
        </div>
      </div>
      <div id="sectionsEditor"></div>
      <button class="add-section-btn" id="addSectionBtn" type="button">+ Agregar sección</button>
    </div>
    <div class="editor-foot">
      <button class="ctrl" data-primary="true" id="saveScriptBtn">Guardar cambios</button>
      <button class="ctrl" id="exportScriptBtn">⭳ Exportar</button>
      <button class="ctrl" id="importScriptBtn">⭱ Adjuntar guion</button>
      <input type="file" id="importScriptInput"
             accept=".json,.md,.markdown,.txt,application/json,text/markdown,text/plain"
             class="sr-only" tabindex="-1">
      <button class="ctrl" id="resetTemplateBtn">Restaurar plantilla</button>
    </div>
  </div>
</div>

<div class="toast" id="toast" role="status" aria-live="polite" hidden></div>

<script>
(function () {
  var STORAGE_KEY = 'pitchup:script:v1';
  var BASE_SPEED = 34; // px/seg a velocidad 100%

  var DEFAULT_DATA = {
    total: 180,
    sections: [
      {
        time: 0, label: 'Apertura', sub: 'Presentación',
        blocks: [
          { type: 'cue', text: '[Cámara, mirada directa, postura abierta, sin pantalla todavía]' },
          { type: 'line', text: 'Hola, soy [tu nombre] y vengo a presentarles [nombre de tu proyecto]. En los próximos minutos les voy a mostrar cuál es el problema que resolvemos, cómo lo resolvemos, y por qué vale la pena apostar por esta idea.' },
          { type: 'note', text: 'Nota vocal: este es el momento de conexión con la audiencia — hablá despacio y mirá a cámara, no lo apures.' }
        ]
      },
      {
        time: 20, label: 'Problema → Solución', sub: 'Problema → Solución',
        blocks: [
          { type: 'cue', text: '[Podés seguir en cámara o cortar a pantalla ya acá]' },
          { type: 'line', text: 'Hoy, [describí quién sufre el problema] enfrenta [describí el problema concreto]. Esto genera [consecuencia del problema: tiempo perdido, errores, costos, etc.].' },

  var DATA = loadData();

                      // so fractional per-frame increments at low speeds would otherwise be lost every frame
  var lastFocusedBeforeEditor = null;

  // ---------- persistence ----------

  function cloneData(d) { return JSON.parse(JSON.stringify(d)); }

  function loadData() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return cloneData(DEFAULT_DATA);
      var parsed = JSON.parse(raw);
      if (!parsed || !Array.isArray(parsed.sections)) return cloneData(DEFAULT_DATA);
      return parsed;
    } catch (e) {
      return cloneData(DEFAULT_DATA);
    }
  }

  function saveData() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(DATA)); } catch (e) { /* storage unavailable */ }
  }

  // ---------- time helpers ----------

  function fmt(totalSeconds) {
    var s = Math.max(0, Math.round(totalSeconds));
    var m = Math.floor(s / 60);
    var r = s % 60;
    return m + ':' + (r < 10 ? '0' : '') + r;
  }

  function parseTime(str) {
    str = String(str == null ? '' : str).trim();
    var m = str.match(/^(\d+):(\d{1,2})$/);
    if (m) return parseInt(m[1], 10) * 60 + parseInt(m[2], 10);
    var n = parseInt(str, 10);
    return isNaN(n) ? 0 : n;
  }

  // ---------- blocks <-> textarea text ----------

  function blocksToText(blocks) {
    return (blocks || []).map(function (b) {
      if (b.type === 'note') return '* ' + b.text;
      return b.text;
    }).join('\n\n');
  }

  function textToBlocks(text) {
    return String(text || '').split(/\n\s*\n/).map(function (p) {
      p = p.trim();
      if (!p) return null;
      if (p.charAt(0) === '[' && p.charAt(p.length - 1) === ']') return { type: 'cue', text: p };
      if (p.charAt(0) === '*') return { type: 'note', text: p.replace(/^\*+\s*/, '') };
      return { type: 'line', text: p };
    }).filter(Boolean);
  }

  // Parses a plain .md / .txt script document into DATA-shaped sections.
  // A line starting with #, ## or ### is treated as a new section heading;
  // "Label | mm:ss | Subtítulo" on that heading line sets time/subtitle too
  // (both optional). Everything before the first heading, or the whole file
  // if there are no headings at all, becomes a single section so plain notes
  // still import instead of being rejected.
  function parseScriptDocument(text) {
    text = String(text || '').replace(/\r\n/g, '\n');
    var lines = text.split('\n');
    var headingRe = /^#{1,3}\s+(.+?)\s*$/;
    var sectionsOut = [];
    var current = null;
    var buffer = [];

    function flush() {
      var body = buffer.join('\n');
      if (current) {
        current.blocks = textToBlocks(body);
        sectionsOut.push(current);
      } else if (body.trim()) {
        sectionsOut.push({ time: 0, label: 'Guion importado', sub: '', blocks: textToBlocks(body) });
      }
      buffer = [];
    }

    lines.forEach(function (line) {
      var m = line.match(headingRe);
      if (!m) { buffer.push(line); return; }
      flush();
      var parts = m[1].split('|').map(function (s) { return s.trim(); });
      var lastTime = sectionsOut.length ? sectionsOut[sectionsOut.length - 1].time : -20;
      current = {
        time: parts[1] ? parseTime(parts[1]) : lastTime + 20,
        label: parts[0] || ('Sección ' + (sectionsOut.length + 1)),
        sub: parts[2] || '',
        blocks: []
      };
    });
    flush();

    return sectionsOut;
  }

  // ---------- toast ----------

  function showToast(message) {
    toastEl.textContent = message;
    toastEl.hidden = false;
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(function () { toastEl.hidden = true; }, 3200);
  }

  // ---------- render script from DATA ----------

  function phaseLabel(index, count) {
    if (count === 1) return 'Guion';
    if (index === 0) return 'Apertura';
    if (index === count - 1) return 'Cierre';
    return 'Desarrollo';
  }

  function renderScript() {
    scriptEl.innerHTML = '';
    sectionsNav.innerHTML = '';

    if (!DATA.sections.length) {
      var hint = document.createElement('p');
      hint.className = 'empty-hint';
      hint.textContent = 'Todavía no hay secciones. Abrí "Editar guion" para agregar la primera.';
      sectionsNav.appendChild(hint);
    }

    DATA.sections.forEach(function (sec, i) {
      var section = document.createElement('section');
      section.setAttribute('data-time', sec.time);
      section.setAttribute('data-label', sec.label || '');

      var eyebrow = document.createElement('div');
      eyebrow.className = 'eyebrow';
      eyebrow.innerHTML =
        phaseLabel(i, DATA.sections.length) +
        ' <span class="eyebrow-time">' + fmt(sec.time) + '</span>' +
        (sec.sub ? '<span class="eyebrow-sub">' + escapeHtml(sec.sub) + '</span>' : '');
      section.appendChild(eyebrow);

      (sec.blocks || []).forEach(function (b) {
        var p = document.createElement('p');
        p.className = b.type === 'cue' ? 'cue' : (b.type === 'note' ? 'note' : 'line');
        p.textContent = b.text;
        section.appendChild(p);
      });

      scriptEl.appendChild(section);

      var chip = document.createElement('button');
      chip.className = 'chip';
      chip.type = 'button';
      chip.dataset.time = sec.time;
      chip.innerHTML = '<span class="chip-time">' + fmt(sec.time) + '</span><span>' + escapeHtml(sec.label || ('Sección ' + (i + 1))) + '</span>';
      chip.addEventListener('click', function () { jumpTo(sec.time); });
      sectionsNav.appendChild(chip);
    });

    if (DATA.sections.length) {
      var end = document.createElement('p');
      end.className = 'the-end';
      end.textContent = '— fin del guion · ' + fmt(DATA.total) + ' —';
      scriptEl.appendChild(end);
    }

    sections = Array.prototype.slice.call(scriptEl.querySelectorAll('section[data-time]'));
    chips = Array.prototype.slice.call(sectionsNav.querySelectorAll('.chip'));
    targetLabel.textContent = fmt(DATA.total);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, function (c) {
      return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
    });
  }

  // ---------- playback ----------

  // scrollTop only holds whole pixels, so at low speeds a fractional per-frame
  // increment (e.g. 0.4px) would otherwise vanish every frame instead of building
  // up into visible motion. The whole-pixel part still drives native scrollTop
  // (so wheel/touch dragging and scrollHeight math keep working normally); the
  // leftover fraction is rendered with a CSS transform, which does support
  // sub-pixel values, so motion stays smooth at any speed instead of stepping.
  function applyScrollPos() {
    var whole = Math.floor(scrollPos);
    var fracPx = scrollPos - whole;
    scrollEl.scrollTop = whole;
    scriptEl.style.transform = fracPx > 0.001 ? 'translateY(-' + fracPx.toFixed(2) + 'px)' : '';
  }

  function jumpTo(secondsTarget) {
    elapsedMs = secondsTarget * 1000;
    var frac = DATA.total > 0 ? secondsTarget / DATA.total : 0;
    var maxScroll = scrollEl.scrollHeight - scrollEl.clientHeight;
    scrollPos = Math.max(0, maxScroll * frac);
    applyScrollPos();
    render();
  }

  function currentSectionIndexByTime(elapsedSec) {
    var idx = 0;
    for (var i = 0; i < sections.length; i++) {
      var t = parseInt(sections[i].getAttribute('data-time'), 10);
      if (t <= elapsedSec) idx = i;
    }
    return idx;
  }

  function currentSectionIndexByScroll() {
    var lineY = stageEl.getBoundingClientRect().top + stageEl.clientHeight * 0.30;
    var best = 0;
    var bestDist = Infinity;
    sections.forEach(function (sec, i) {
      var r = sec.getBoundingClientRect();
      if (r.top <= lineY) {
        var dist = lineY - r.top;
        if (dist < bestDist) { bestDist = dist; best = i; }
      }
    });
    return best;
  }

  function render() {
    var elapsedSec = elapsedMs / 1000;
    elapsedEl.textContent = fmt(elapsedSec);
    var pct = DATA.total > 0 ? Math.min(100, (elapsedSec / DATA.total) * 100) : 0;
    progressFill.style.width = pct + '%';

    if (!sections.length) { pacePill.textContent = 'Sin guion'; pacePill.dataset.pace = 'on'; return; }

    var byTime = currentSectionIndexByTime(elapsedSec);
    var byScroll = currentSectionIndexByScroll();

    chips.forEach(function (chip, i) {
      chip.dataset.active = (i === byScroll) ? 'true' : 'false';
    });

    if (!playing && elapsedMs === 0) {
      pacePill.textContent = 'Listo';
      pacePill.dataset.pace = 'on';
    } else if (byScroll === byTime) {
      pacePill.textContent = 'En horario';
      pacePill.dataset.pace = 'on';
    } else if (byScroll > byTime) {
      pacePill.textContent = 'Adelantado';
      pacePill.dataset.pace = 'ahead';
    } else {
      pacePill.textContent = 'Atrasado';
      pacePill.dataset.pace = 'behind';
    }
  }

  function tick(ts) {
    if (!playing) return;
    if (lastTick === null) lastTick = ts;
    var dt = ts - lastTick;
    lastTick = ts;

    elapsedMs += dt;
    var pxPerSec = BASE_SPEED * (speedPct / 100);
    scrollPos += pxPerSec * (dt / 1000);
    applyScrollPos();

    render();

    var maxScroll = scrollEl.scrollHeight - scrollEl.clientHeight;
    if (scrollPos >= maxScroll - 2) {
      pause();
      return;
    }
    rafId = requestAnimationFrame(tick);
  }

  function play() {
    if (playing || !sections.length) return;
    playing = true;
    lastTick = null;
    scrollPos = scrollEl.scrollTop;
    playBtn.textContent = '⏸ Pausar';
    rafId = requestAnimationFrame(tick);
  }

  function pause() {
    playing = false;
    playBtn.textContent = '▶ Continuar';
    if (rafId) cancelAnimationFrame(rafId);
    scriptEl.style.transform = '';
  }

  function reset() {
    pause();
    elapsedMs = 0;
    scrollPos = 0;
    applyScrollPos();
    playBtn.textContent = '▶ Iniciar';
    render();
  }

  playBtn.addEventListener('click', function () {
    if (playing) pause(); else play();
  });
  resetBtn.addEventListener('click', reset);

  function setSpeed(pct) {
    if (isNaN(pct)) return;
    pct = Math.max(30, Math.min(200, Math.round(pct)));
    speedPct = pct;
    speedSlider.value = pct;
    speedNumber.value = pct;
    speedSlider.setAttribute('aria-valuetext', pct + '%');
  }
  speedSlider.addEventListener('input', function () {
    setSpeed(parseInt(speedSlider.value, 10));
  });
  speedNumber.addEventListener('change', function () {
    setSpeed(parseInt(speedNumber.value, 10));
  });
  speedNumber.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') speedNumber.blur();
  });

  document.getElementById('sizeUp').addEventListener('click', function () {
    fontSize = Math.min(52, fontSize + 2);
    document.documentElement.style.setProperty('--script-size', fontSize + 'px');
  });
  document.getElementById('sizeDown').addEventListener('click', function () {
    fontSize = Math.max(20, fontSize - 2);
    document.documentElement.style.setProperty('--script-size', fontSize + 'px');
  });

  mirrorBtn.addEventListener('click', function () {
    stageEl.classList.toggle('mirrored');
  });

  fullscreenBtn.addEventListener('click', function () {
    try {
      if (document.fullscreenElement) {
        var exitResult = document.exitFullscreen();
        if (exitResult && exitResult.catch) exitResult.catch(function () { showToast('No se pudo salir de pantalla completa en este navegador.'); });
        return;
      }
      var result = document.documentElement.requestFullscreen();
      if (result && result.catch) {
        result.catch(function () {
          showToast('Tu navegador bloqueó pantalla completa. Probá abrir esta página en una pestaña normal.');
        });
      }
    } catch (e) {
      showToast('Pantalla completa no está disponible acá. Probá abrir esta página en una pestaña normal.');
    }
  });

  scrollEl.addEventListener('scroll', function () {
    if (!playing) {
      scrollPos = scrollEl.scrollTop;
      scriptEl.style.transform = '';
      render();
    }
  });

  document.addEventListener('keydown', function (e) {
    if (!overlay.hidden) {
      if (e.key === 'Escape') closeEditor();
      return;
    }
    var tag = (e.target && e.target.tagName) || '';
    if (tag === 'INPUT' || tag === 'TEXTAREA') return;

    if (e.code === 'Space') {
      e.preventDefault();
      if (playing) pause(); else play();
    } else if (e.code === 'ArrowUp') {
      e.preventDefault();
      setSpeed(speedPct + 5);
    } else if (e.code === 'ArrowDown') {
      e.preventDefault();
      setSpeed(speedPct - 5);
    } else if (e.key === 'm' || e.key === 'M') {
      mirrorBtn.click();
    } else if (e.key === 'f' || e.key === 'F') {
      fullscreenBtn.click();
    } else if (e.key === 'r' || e.key === 'R') {
      reset();
    } else if (e.key === 'e' || e.key === 'E') {
      openEditor();
    }
  });

  // ---------- editor ----------

  function buildSectionCard(sec, index) {
    var card = document.createElement('div');
    card.className = 'section-card';
    card.dataset.index = index;

    var head = document.createElement('div');
    head.className = 'section-card-head';

    var title = document.createElement('span');
    title.className = 'section-card-title';
    title.textContent = 'Sección ' + (index + 1);
    head.appendChild(title);

    var actions = document.createElement('div');
    var upBtn = document.createElement('button');
    upBtn.className = 'icon-btn'; upBtn.type = 'button'; upBtn.textContent = '↑'; upBtn.setAttribute('aria-label', 'Mover sección arriba');
    upBtn.addEventListener('click', function () { moveSection(index, -1); });
    var downBtn = document.createElement('button');
    downBtn.className = 'icon-btn'; downBtn.type = 'button'; downBtn.textContent = '↓'; downBtn.setAttribute('aria-label', 'Mover sección abajo');
    downBtn.addEventListener('click', function () { moveSection(index, 1); });
    var delBtn = document.createElement('button');
    delBtn.className = 'icon-btn'; delBtn.type = 'button'; delBtn.textContent = '✕'; delBtn.dataset.danger = 'true'; delBtn.setAttribute('aria-label', 'Eliminar sección');
    delBtn.addEventListener('click', function () { deleteSection(index); });
    actions.appendChild(upBtn); actions.appendChild(downBtn); actions.appendChild(delBtn);
    head.appendChild(actions);

    card.appendChild(head);

    var row = document.createElement('div');
    row.className = 'field-row';

    var timeField = document.createElement('div');
    timeField.className = 'field';
    timeField.innerHTML = '<label>Tiempo (mm:ss)</label>';
    var timeInput = document.createElement('input');
    timeInput.type = 'text'; timeInput.value = fmt(sec.time); timeInput.inputMode = 'numeric';
    timeInput.addEventListener('change', function () { DATA.sections[index].time = parseTime(timeInput.value); });
    timeField.appendChild(timeInput);
    row.appendChild(timeField);

    var labelField = document.createElement('div');
    labelField.className = 'field';
    labelField.innerHTML = '<label>Etiqueta</label>';
    var labelInput = document.createElement('input');
    labelInput.type = 'text'; labelInput.value = sec.label || '';
    labelInput.addEventListener('change', function () { DATA.sections[index].label = labelInput.value; });
    labelField.appendChild(labelInput);
    row.appendChild(labelField);

    card.appendChild(row);

    var subField = document.createElement('div');
    subField.className = 'field';
    subField.innerHTML = '<label>Subtítulo (opcional)</label>';
    var subInput = document.createElement('input');
    subInput.type = 'text'; subInput.value = sec.sub || '';
    subInput.addEventListener('change', function () { DATA.sections[index].sub = subInput.value; });
    subField.appendChild(subInput);
    card.appendChild(subField);

    var textField = document.createElement('div');
    textField.className = 'field';
    textField.innerHTML = '<label>Contenido</label>';
    var textArea = document.createElement('textarea');
    textArea.value = blocksToText(sec.blocks);
    textArea.rows = 5;
    textArea.addEventListener('change', function () { DATA.sections[index].blocks = textToBlocks(textArea.value); });
    textField.appendChild(textArea);
    var textHint = document.createElement('span');
    textHint.className = 'field-hint';
    textHint.textContent = 'Un párrafo por bloque, separados con línea en blanco. Entre [corchetes] = acotación de cámara. Empezá con * = nota para vos.';
    textField.appendChild(textHint);
    card.appendChild(textField);

    return card;
  }

  function renderEditor() {
    totalInput.value = fmt(DATA.total);
    sectionsEditor.innerHTML = '';
    DATA.sections.forEach(function (sec, i) {
      sectionsEditor.appendChild(buildSectionCard(sec, i));
    });
  }

  function moveSection(index, dir) {
    var target = index + dir;
    if (target < 0 || target >= DATA.sections.length) return;
    var tmp = DATA.sections[index];
    DATA.sections[index] = DATA.sections[target];
    DATA.sections[target] = tmp;
    renderEditor();
  }

  function deleteSection(index) {
    DATA.sections.splice(index, 1);
    renderEditor();
  }

  addSectionBtn.addEventListener('click', function () {
    var lastTime = DATA.sections.length ? DATA.sections[DATA.sections.length - 1].time + 20 : 0;
    DATA.sections.push({ time: lastTime, label: 'Nueva sección', sub: '', blocks: [{ type: 'line', text: 'Escribí acá lo que vas a decir.' }] });
    renderEditor();
    sectionsEditor.lastElementChild.scrollIntoView({ block: 'nearest' });
  });

  saveScriptBtn.addEventListener('click', function () {
    DATA.total = parseTime(totalInput.value) || DATA.total;
    saveData();
    renderScript();
    reset();
    closeEditor();
    showToast('Guion guardado.');
  });

  resetTemplateBtn.addEventListener('click', function () {
    if (!window.confirm('Esto reemplaza el guion actual por la plantilla de ejemplo. ¿Continuar?')) return;
    DATA = cloneData(DEFAULT_DATA);
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) { /* ignore */ }
    renderEditor();
    renderScript();
    reset();
    showToast('Se restauró la plantilla de ejemplo.');
  });

  exportScriptBtn.addEventListener('click', function () {
    DATA.total = parseTime(totalInput.value) || DATA.total;
    var blob = new Blob([JSON.stringify(DATA, null, 2)], { type: 'application/json' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'pitch-up-guion.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
  });

  importScriptBtn.addEventListener('click', function () { importScriptInput.click(); });
  importScriptInput.addEventListener('change', function () {
    var file = importScriptInput.files && importScriptInput.files[0];
    if (!file) return;
    var isJsonName = /\.json$/i.test(file.name);
    var reader = new FileReader();
    reader.onload = function () {
      var text = String(reader.result);
      var parsedJson = null;
      try { parsedJson = JSON.parse(text); } catch (e) { parsedJson = null; }

      if (parsedJson && Array.isArray(parsedJson.sections)) {
        DATA = parsedJson;
        renderEditor();
        showToast('Guion importado desde JSON. Revisá y guardá los cambios.');
      } else if (isJsonName) {
        showToast('No se pudo leer ese archivo JSON: formato inválido.');
      } else {
        var sections = parseScriptDocument(text);
        if (!sections.length) {
          showToast('El documento está vacío, no se importó nada.');
        } else {
          DATA = { total: DATA.total, sections: sections };
          renderEditor();
          showToast('Guion adjuntado: ' + sections.length + (sections.length === 1 ? ' sección' : ' secciones') + '. Revisá tiempos y guardá.');
        }
      }
      importScriptInput.value = '';
    };
    reader.readAsText(file);
  });

  function openEditor() {
    lastFocusedBeforeEditor = document.activeElement;
    pause();
    renderEditor();
    overlay.hidden = false;
    editorCloseBtn.focus();
  }

  function closeEditor() {
    overlay.hidden = true;
    if (lastFocusedBeforeEditor && lastFocusedBeforeEditor.focus) lastFocusedBeforeEditor.focus();
  }

  editBtn.addEventListener('click', openEditor);
  editorCloseBtn.addEventListener('click', closeEditor);
  overlay.addEventListener('click', function (e) { if (e.target === overlay) closeEditor(); });

  editorPanel.addEventListener('keydown', function (e) {
    if (e.key !== 'Tab') return;
    var focusable = editorPanel.querySelectorAll('button, [href], input, textarea, select, [tabindex]:not([tabindex="-1"])');
    if (!focusable.length) return;
    var first = focusable[0], last = focusable[focusable.length - 1];
    if (e.shiftKey && document.activeElement === first) { e.preventDefault(); last.focus(); }
    else if (!e.shiftKey && document.activeElement === last) { e.preventDefault(); first.focus(); }
  });

  // ---------- boot ----------

  renderScript();
  render();

  if ('serviceWorker' in navigator && (location.protocol === 'https:' || location.hostname === 'localhost')) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function () { /* offline install not critical */ });
    });
  }
})();
</script>
</body>
</html>
